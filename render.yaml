services:
  - type: web
    name: opinioniq-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
